<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SmartLocal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1e3a44 0%, #2d5a61 30%, #5b8c85 60%, #a2c1b4 100%);
        }
        .signup-card {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            padding: 3rem 2.5rem; border-radius: 24px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%; max-width: 440px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .helptext {
            font-size: 11px; color: #7f8c8d; display: block; margin-top: 4px; font-weight: 400; text-align: left; padding: 0 5px;
        }
        h2 { color: #2c3e50; font-size: 32px; margin-bottom: 8px; font-weight: 700; }
        .subtitle { color: #5d6d7e; margin-bottom: 2rem; font-size: 15px; }
        
        /* Styling Django's form paragraphs */
        form p { text-align: left; margin-bottom: 1.2rem; color: #34495e; font-weight: 600; font-size: 14px; }
        input { 
            width: 100%; padding: 12px 18px; margin-top: 5px; border: 1px solid #d5dbdb; 
            border-radius: 12px; font-size: 14px; outline: none; background: rgba(255,255,255,0.5);
        }
        button {
            width: 100%; padding: 14px; background-color: #34495e; border: none;
            border-radius: 12px; color: white; font-size: 17px; font-weight: 600;
            cursor: pointer; margin-top: 1rem; transition: background 0.3s;
        }
        button:hover { background-color: #2c3e50; }
        .helptext { font-size: 11px; color: #7f8c8d; display: block; margin-top: 4px; font-weight: 400; }
        .login-link { margin-top: 20px; font-size: 14px; color: #5d6d7e; }
        .login-link a { color: #2d5a61; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2>Join SmartLocal</h2>
        <p class="subtitle">Create an account to report issues</p>
        <div class ="helptext">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Create Account</button>
            </form>
        </div>

        <p class="login-link">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
    </div>
</body>
</html>
